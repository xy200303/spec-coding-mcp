name: Publish npm

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish as a dry run instead of publishing.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Verify release tag matches package version
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#v}"
          if [ "$tag" != "$version" ]; then
            echo "Release tag v$tag does not match package.json version $version."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          if npm view "$package_name@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$version already exists on npm."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && steps.npm_version.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip existing npm version
        if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && steps.npm_version.outputs.exists == 'true'
        run: echo "Package version already exists on npm; skipping publish."
